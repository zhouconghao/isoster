# AutoProf arm roster.
#
# Ported from /Users/shuang/Dropbox/work/project/otters/sga_isoster/config/
# autoprof_benchmark.yaml. Arm keys map directly onto AutoProf's
# ap_* options (the campaign fitter merges these into a defaults dict
# before writing the options JSON).
#
# By design, no arm here hard-fixes the center by default: AutoProf is
# meant to find its own via the pipeline_steps/Center.py routines, and
# the benchmark is fairest when each tool runs in its recommended mode.
# The `fix_center` arm is the one exception: it pins AutoProf's center
# to an isoster-derived reference so we can isolate centering quality
# from profile-extraction quality.
#
# Sentinel resolved by the fitter at run time:
#   _fix_center_from: isoster_weighted
#     Reads <galaxy_dir>/isoster/arms/ref_default/profile.fits and sets
#     ap_set_center to the intensity-weighted (x0, y0) over the first
#     10 isophotes with stop_code == 0. Arm is skipped if the isoster
#     reference profile is absent (isoster must run before autoprof).

arms:

  baseline:
    ap_isoclip: true
    ap_isoclip_nsigma: 5.0
    ap_regularize_scale: 1.0
    ap_fit_limit: 2.0
    ap_samplegeometricscale: 0.1

  no_clip:
    ap_isoclip: false
    ap_regularize_scale: 1.0
    ap_fit_limit: 2.0
    ap_samplegeometricscale: 0.1

  deep:
    ap_isoclip: true
    ap_isoclip_nsigma: 5.0
    ap_fit_limit: 1.0
    ap_samplegeometricscale: 0.05
    ap_iso_interpolate_start: 3

  high_regularization:
    ap_isoclip: true
    ap_isoclip_nsigma: 5.0
    ap_regularize_scale: 2.0
    ap_fit_limit: 2.0
    ap_samplegeometricscale: 0.1

  fix_center:
    _fix_center_from: isoster_weighted
    ap_isoclip: true
    ap_isoclip_nsigma: 5.0
    ap_regularize_scale: 1.0
    ap_fit_limit: 2.0
    ap_samplegeometricscale: 0.1
