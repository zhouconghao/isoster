# Exhausted benchmark campaign - example configuration.
#
# Copy this file and edit for your campaign:
#   cp campaign.example.yaml /tmp/my_campaign.yaml
#   # then edit /tmp/my_campaign.yaml
#   uv run python -m benchmarks.exhausted.orchestrator.cli dry-run /tmp/my_campaign.yaml

campaign_name: "2026-04-20_initial_huang2013"
# Repo-relative (under gitignored outputs/) by default; also accepts
# absolute or $HOME-relative (e.g. "/data/...", "~/campaign_runs/...").
output_root: "outputs/benchmark_exhausted"

# --- Tools to run ---
# Tool-specific arms live in the files referenced by arms_file.
tools:
  isoster:
    enabled: true
    arms_file: benchmarks/exhausted/configs/isoster_arms.yaml
  photutils:
    enabled: false
    arms_file: benchmarks/exhausted/configs/photutils_arms.yaml   # Phase D
  autoprof:
    enabled: false
    arms_file: benchmarks/exhausted/configs/autoprof_arms.yaml    # Phase D
    venv_python: "/tmp/autoprof_venv/bin/python"

# --- Parameterized isoster arms ---
# Each entry expands into one arm with id "harm_higher_orders::<nums joined by _>".
# Default is a single list; add more to grow the matrix.
isoster_harmonic_sweeps:
  - [5, 6]
  # - [5, 6, 7, 8]

# --- Datasets ---
# Each dataset references an adapter under benchmarks/exhausted/adapters/.
datasets:
  huang2013:
    enabled: true
    adapter: huang2013
    root: "~/isophote_test/output/huang2013"
    # Optional: galaxy allowlist. If omitted, runs all galaxies the adapter finds.
    # select:
    #   - "NGC_0596/mock001"
    #   - "NGC_0596/mock002"
  hsc_edge_real:
    enabled: false
    adapter: hsc_edge_real
    root: "examples/example_hsc_edge_real/data"
  hsc_edgecases:
    enabled: false
    adapter: hsc_edgecases
    root: "examples/example_hsc_edgecases/data"

# --- QA toggles ---
qa:
  per_galaxy_qa: true
  cross_arm_overlay: true
  cross_tool_comparison: true  # effective only when >=2 tools are enabled
  # summary_grids held off by default: the N-thumbnail grid format does
  # not scale past ~20 galaxies. Raw outputs (profile.fits / inventory.fits
  # / run_record.json) are enough to reconstruct any multi-galaxy figure
  # offline. Set to true on small datasets where the grids are useful.
  summary_grids: false
  residual_models: true

# --- Execution controls ---
execution:
  max_parallel_galaxies: 4
  skip_existing: true
  dry_run: false
  fail_fast: false

# --- Statistical summary ---
summary:
  per_galaxy_inventory: true
  per_tool_cross_arm_table: true
  cross_tool_table: true
  # Composite score axes (lower = better). PA and eps drift are not
  # scored: they can be genuinely astrophysical (isophote twist,
  # ellipticity gradient). Residual RMS in three radial zones captures
  # fit fidelity; centroid drift captures nucleus wander; stop-code
  # counts and n_iso completeness capture convergence behavior.
  composite_score_weights:
    # Fidelity (resid_rms_zone / image_sigma)
    resid_inner: 1.0
    resid_mid: 1.0
    resid_outer: 2.0
    # Center stability
    centroid_drift: 1.0
    centroid_tol_pix: 2.0    # divisor; tolerate up to this per isophote
    # Convergence health
    n_stop_m1: 2.0
    frac_stop_nonzero: 5.0
    # Completeness
    n_iso_completeness: 3.0
    # Speed (minor tie-breaker)
    wall_time: 0.1
