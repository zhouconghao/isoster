# Smoke-test campaign against the two local FITS files in data/.
# Useful for iterating on the framework before Huang2013 data lands.
#
# Expected runtime on a laptop: ~1-3 min for the full arm roster on both
# galaxies. Scale down via the `select:` list or trim isoster_arms.yaml.

campaign_name: "smoke_local_data"
output_root: "outputs/benchmark_exhausted"   # repo-relative (under gitignored outputs/)

tools:
  isoster:
    enabled: true
    arms_file: benchmarks/exhausted/configs/isoster_arms.yaml
  photutils:
    enabled: true
    arms_file: benchmarks/exhausted/configs/photutils_arms.yaml
  autoprof:
    enabled: true
    arms_file: benchmarks/exhausted/configs/autoprof_arms.yaml
    venv_python: "/tmp/autoprof_venv/bin/python"
    timeout: 300

isoster_harmonic_sweeps:
  - [5, 6]

datasets:
  local_fits:
    enabled: true
    adapter: local_fits
    root: data
    files:
      - path: IC3370_mock2.fits
        galaxy_id: IC3370_mock2
      - path: ngc3610.fits
        galaxy_id: ngc3610_r
        band_index: 1          # r-band (index 1 of g/r/i cube)
        pixel_scale_arcsec: 1.0 # CD matrix implies ~1"/pix for this cube
        sb_zeropoint: 22.5      # SDSS nominal
        sma0: 6.0

qa:
  per_galaxy_qa: true
  cross_arm_overlay: true     # Phase C
  cross_tool_comparison: true # Phase D (needs >=2 tools)
  # summary_grids default-off: the per-(tool, arm) N-thumbnail format
  # does not scale past ~20 galaxies. Raw data in profile.fits +
  # inventory.fits + run_record.json is enough to reconstruct any
  # multi-galaxy figure offline.
  summary_grids: false
  residual_models: true

execution:
  max_parallel_galaxies: 1    # parallelism deferred to Phase E
  skip_existing: true
  dry_run: false
  fail_fast: false

summary:
  per_galaxy_inventory: true
  per_galaxy_cross_arm_table: true   # Phase C
  per_tool_cross_arm_table: true     # Phase C
  cross_tool_table: true              # Phase D
  # Composite score axes (lower = better). PA and ellipticity drift are
  # intentionally NOT scored: they can be genuinely astrophysical.
  composite_score_weights:
    # Fidelity (residual RMS in zone, divided by image_sigma)
    resid_inner: 1.0
    resid_mid: 1.0
    resid_outer: 2.0
    # Center stability (combined_drift_pix / centroid_tol_pix)
    centroid_drift: 1.0
    centroid_tol_pix: 2.0    # divisor; for real galaxies scale with PSF FWHM
    # Convergence health
    n_stop_m1: 2.0
    frac_stop_nonzero: 5.0
    # Completeness (penalize short fits vs. the best arm on this galaxy)
    n_iso_completeness: 3.0
    # Speed (tie-breaker)
    wall_time: 0.1
