site_name: Isoster Documentation
site_description: Fast isophote fitting for galaxy images.
site_author: Shuang
repo_url: https://github.com/shuang-stat/isoster
theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Home: index.md
  - Spec: spec.md
  - User Guide: user-guide.md
  - Algorithm: algorithm.md
  - Future: future.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
